name: Build CNC Preview Plugin

on:
  push:
    branches: [ main, develop ]
    tags:     [ 'v*.*.*' ]
  pull_request:
    branches: [ main ]

env:
  PROJECT: CncPreviewHandler/CncPreviewHandler.csproj
  CONFIG:  Release

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          $v = if ("${{ github.ref_type }}" -eq "tag") { "${{ github.ref_name }}".TrimStart("v") } else { "0.0.0" }
          echo "VERSION=$v" >> $env:GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore ${{ env.PROJECT }}

      - name: Build
        run: |
          dotnet build ${{ env.PROJECT }} `
            --configuration ${{ env.CONFIG }} `
            --no-restore `
            -p:AssemblyVersion=${{ steps.ver.outputs.VERSION }} `
            -p:FileVersion=${{ steps.ver.outputs.VERSION }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CncPreviewHandler-${{ github.sha }}
          path: CncPreviewHandler/bin/${{ env.CONFIG }}/net48/CncPreviewHandler.dll
          if-no-files-found: error

  release:
    needs: build
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}".TrimStart("v")
          echo "VERSION=$v" >> $env:GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore ${{ env.PROJECT }}

      - name: Build
        run: |
          dotnet build ${{ env.PROJECT }} `
            --configuration ${{ env.CONFIG }} `
            --no-restore `
            -p:AssemblyVersion=${{ steps.ver.outputs.VERSION }} `
            -p:FileVersion=${{ steps.ver.outputs.VERSION }}

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release -Force | Out-Null
          Copy-Item "CncPreviewHandler\bin\${{ env.CONFIG }}\net48\CncPreviewHandler.dll" release
          Copy-Item "CncPreviewHandler\bin\${{ env.CONFIG }}\net48\SharpShell.dll"        release
          Copy-Item "installer\install.ps1"   release
          Copy-Item "installer\uninstall.ps1" release
          Copy-Item "installer\README.txt"    release
          Compress-Archive -Path "release\*" -DestinationPath "CncPreviewHandler-${{ github.ref_name }}-x64.zip"

      - uses: softprops/action-gh-release@v2
        with:
          files: CncPreviewHandler-${{ github.ref_name }}-x64.zip
          generate_release_notes: true
